# T6-002: Alertmanager configuration for Velox Trading Bot
#
# Routes alerts from Prometheus to Telegram (primary) and email (fallback).
# Configure credentials via environment variables in .env:
#   TELEGRAM_BOT_TOKEN  — Telegram bot API token
#   TELEGRAM_CHAT_ID    — Target chat/channel ID
#   SMTP_SMARTHOST      — SMTP relay (e.g. smtp.gmail.com:587)
#   SMTP_FROM           — Sender address
#   SMTP_AUTH_USERNAME   — SMTP username
#   SMTP_AUTH_PASSWORD   — SMTP password
#   ALERT_EMAIL_TO      — Recipient address

global:
  resolve_timeout: 5m

  # SMTP defaults — email alerting is OPTIONAL.
  # To enable: set SMTP vars in .env, then uncomment below.
  # smtp_smarthost: "smtp.gmail.com:587"
  # smtp_from: "velox-alerts@example.com"
  # smtp_auth_username: ""
  # smtp_auth_password: ""
  # smtp_require_tls: true

route:
  # Default receiver
  receiver: telegram-critical
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts — immediate Telegram push, no grouping delay
    - match:
        severity: critical
      receiver: telegram-critical
      group_wait: 0s
      repeat_interval: 1h

    # Warning alerts — batched every 5 minutes
    - match:
        severity: warning
      receiver: telegram-warning
      group_wait: 2m
      repeat_interval: 4h

    # ML team alerts
    - match:
        team: ml
      receiver: telegram-warning
      group_wait: 5m
      repeat_interval: 12h

inhibit_rules:
  # If critical API failure is firing, suppress the warning-level API alert
  - source_match:
      alertname: APIFailureRateCritical
    target_match:
      alertname: APIFailureRate
    equal: ["team"]

  # If scan is critically slow, suppress the warning
  - source_match:
      alertname: ScanLatencyCritical
    target_match:
      alertname: ScanLatencyHigh
    equal: ["team"]

receivers:
  # Default receiver — logs to stdout (always works)
  - name: telegram-critical
    webhook_configs:
      - url: "http://velox-v12:8080/api/alerts"
        send_resolved: true

  - name: telegram-warning
    webhook_configs:
      - url: "http://velox-v12:8080/api/alerts"
        send_resolved: true

  # To enable Telegram alerts directly from Alertmanager:
  # Uncomment below and set bot_token + chat_id from your .env
  #
  # - name: telegram-critical
  #   telegram_configs:
  #     - bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  #       chat_id: 123456789
  #       parse_mode: HTML
  #       message: |
  #         <b>VELOX CRITICAL:</b> {{ .GroupLabels.alertname }}
  #         {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
  #
  # - name: email-fallback
  #   email_configs:
  #     - to: "your-email@example.com"
