name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify core imports
        run: |
          python -c "
          # Core modules
          import config
          import database
          from data import get_account, get_positions

          # Strategies
          from strategies.base import Signal
          from strategies.stat_mean_reversion import StatMeanReversion
          from strategies.kalman_pairs import KalmanPairsTrader
          from strategies.micro_momentum import IntradayMicroMomentum
          from strategies.vwap import VWAPStrategy
          from strategies.regime import MarketRegime

          # Risk engine
          from risk import RiskManager, VolatilityTargetingRiskEngine, DailyPnLLock, BetaNeutralizer

          # V10: Engine package
          from engine.startup import initialize_strategies, initialize_risk_engines
          from engine.signal_processor import process_signals
          from engine.scanner import scan_all_strategies
          from engine.daily_tasks import daily_reset
          from engine.broker_sync import sync_positions_with_broker
          from engine.exit_processor import handle_ws_close
          from engine.events import EventBus
          from engine.metrics import MetricsCollector

          # V10: OMS
          from oms.order import Order, OrderState
          from oms.order_manager import OrderManager
          from oms.kill_switch import KillSwitch
          from oms.transaction_cost import TransactionCostModel

          # V10: Risk modules
          from risk.circuit_breaker import TieredCircuitBreaker
          from risk.var_monitor import VaRMonitor
          from risk.correlation_limiter import CorrelationLimiter

          # V10: Database abstraction
          from db import get_engine
          from db.models import Trade, Signal as SignalModel

          # V10: Auth
          from auth.jwt_auth import create_token, verify_token

          # Analytics
          from analytics import compute_analytics, sharpe_ratio, profit_factor
          from analytics.ou_tools import fit_ou_params, compute_zscore
          from analytics.hurst import hurst_exponent
          from analytics.consistency_score import compute_consistency_score

          print('All V10 imports OK')
          "

      - name: Run tests
        run: |
          pytest tests/ \
            -v --tb=short \
            --cov=. --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t velox-v10 .

      - name: Verify health endpoint
        run: |
          docker run -d --name velox-test -p 8080:8080 \
            -e ALPACA_API_KEY=test -e ALPACA_API_SECRET=test \
            velox-v10 || true
          sleep 5
          docker logs velox-test 2>&1 | tail -20 || true
          docker stop velox-test || true
          docker rm velox-test || true
