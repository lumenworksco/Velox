name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify core imports
        env:
          TESTING: "1"
        run: |
          python -c "
          # Core
          import config
          import database

          # Strategies
          from strategies.base import Signal
          from strategies.stat_mean_reversion import StatMeanReversion
          from strategies.kalman_pairs import KalmanPairsTrader
          from strategies.micro_momentum import IntradayMicroMomentum
          from strategies.vwap import VWAPStrategy
          from strategies.orb_v2 import ORBStrategyV2
          from strategies.pead import PEADStrategy

          # Engine
          from engine.signal_processor import process_signals
          from engine.scanner import scan_all_strategies
          from engine.exit_orchestrator import get_exit_orchestrator
          from engine.profit_maximizer import IntradayVolRegime, WinStreakTracker

          # OMS
          from oms.order import Order, OrderState
          from oms.order_manager import OrderManager
          from oms.kill_switch import KillSwitch

          # Risk
          from risk.risk_manager import RiskManager
          from risk.circuit_breaker import TieredCircuitBreaker
          from risk.var_monitor import VaRMonitor
          from risk.correlation_limiter import CorrelationLimiter
          from risk.kelly import KellyEngine
          from risk.vol_targeting import VolatilityTargetingRiskEngine

          # ML
          from ml.inference import BatchInferenceEngine
          from ml.model_monitor import get_model_monitor

          # Analytics
          from analytics import compute_analytics, sharpe_ratio, profit_factor
          from analytics.ou_tools import fit_ou_params, compute_zscore
          from analytics.hurst import hurst_exponent
          from analytics.signal_ranker import SignalRanker

          print('All V12 imports OK')
          "

      - name: Run tests
        env:
          TESTING: "1"
        run: |
          pytest tests/ \
            -v --tb=short \
            --ignore=tests/test_stress_testing.py \
            -x \
            2>&1 | head -500

      - name: Upload coverage
        if: always() && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t velox-v12 .

      - name: Smoke test
        run: |
          docker run -d --name velox-test -p 8080:8080 \
            -e ALPACA_API_KEY=test -e ALPACA_API_SECRET=test \
            -e TESTING=1 \
            velox-v12 || true
          sleep 10
          docker logs velox-test 2>&1 | tail -20 || true
          docker stop velox-test || true
          docker rm velox-test || true
