allocations:
  STAT_MR:      0.25       # V12 AUDIT: Reduced from 0.35 — crowded edge
  VWAP:         0.13       # V12 AUDIT: Reduced from 0.20 — overlaps with STAT_MR
  KALMAN_PAIRS: 0.27       # V12 AUDIT: Increased from 0.20 — diversifying
  ORB:          0.12       # V12 AUDIT: Increased from 0.10 — good risk mgmt
  MICRO_MOM:    0.05       # V12 AUDIT: Reduced from 0.10 — weak signals
  PEAD:         0.18       # V12 AUDIT: Increased from 0.05 — orthogonal edge

# --- Statistical Mean Reversion ---
stat_mr:
  zscore_entry:        1.5
  zscore_exit_full:    0.2
  zscore_exit_partial: 0.5
  zscore_stop:         2.5
  rsi_period:          7
  rsi_oversold:        40
  rsi_overbought:      60
  hurst_max:           0.52
  halflife_min_hours:  1
  halflife_max_hours:  48
  universe_size:       40
  min_gain_pct:        0.002
  min_rr_ratio:        2.0        # V12: Tightened from 1.5

# --- VWAP Mean Reversion ---
vwap:
  ou_zscore_min:       1.0
  max_spread_pct:      0.0015     # V12: Loosened from 0.001
  volume_ratio:        1.0        # V12: Tightened from 0.8
  max_intraday_move_pct: 0.03
  band_std:            1.5        # V12: Tightened from 2.0
  rsi_oversold:        40         # V12 FINAL: Reverted to 40 — 45 allowed false signals
  rsi_overbought:      70
  confirmation_bars:   1
  stop_extension:      0.5
  min_stop_pct:        0.01

# --- Kalman Pairs Trading ---
kalman_pairs:
  zscore_entry:        1.2        # V12 FINAL: Lowered from 1.5 — captures more pair setups
  zscore_exit:         0.2
  zscore_stop:         3.0
  max_hold_days:       10
  max_active:          15
  min_correlation:     0.80
  coint_pvalue:        0.05
  kalman_delta:        0.0001
  kalman_obs_noise:    0.001
  tp_pct:              0.015
  sl_pct:              0.010

# --- Opening Range Breakout ---
orb:
  enabled:             true
  volume_ratio:        2.0        # V12: Tightened from 1.3
  max_gap_pct:         0.04
  max_range_pct:       0.035
  min_stop_pct:        0.008
  scan_symbols:        15
  breakout_buffer:     0.0025     # V12: Increased from 0.001
  tp_mult:             2.0        # V12: Widened from 1.5
  sl_mult:             0.7        # V12: Widened from 0.5
  time_stop_hours:     2
  adx_filter_enabled:  true
  adx_min:             25
  adx_period:          14

# --- Micro Momentum ---
micro_momentum:
  spy_vol_spike_mult:  2.0
  spy_min_move_pct:    0.0015     # V12: Tightened from 0.001
  max_hold_minutes:    20         # V12: Extended from 15
  stop_pct:            0.01
  target_pct:          0.02
  max_trades_per_event: 4         # V12: Doubled from 2
  max_daily_gain_disable: 0.015
  top_beta_stocks:     5
  event_cooldown_sec:  900
  event_window_sec:    300

# --- Post-Earnings Announcement Drift ---
pead:
  enabled:             true
  min_surprise_pct:    2.0        # V12 FINAL: Lowered from 3.0 — drift starts at 2% per research
  min_volume_ratio:    2.0
  hold_days_min:       3          # V12: Fixed MIN/MAX inversion
  hold_days_max:       10         # V12: Shortened from 20
  take_profit:         0.05
  stop_loss:           0.02       # V12: Tightened from 0.03
  max_positions:       5
  position_size_pct:   0.02
