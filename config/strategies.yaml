# =============================================================
# Strategy Parameters — ARCH-006
#
# Loaded by ConfigManager.  Values here override compiled defaults
# in config.py.  Hot-reload supported: edit and save while running.
# =============================================================

allocations:
  STAT_MR:      0.40
  VWAP:         0.20
  KALMAN_PAIRS: 0.20
  PEAD:         0.10
  ORB:          0.05
  MICRO_MOM:    0.05

# --- Statistical Mean Reversion ---
stat_mr:
  zscore_entry:        1.5
  zscore_exit_full:    0.2
  zscore_exit_partial: 0.5
  zscore_stop:         2.5
  rsi_period:          7
  rsi_oversold:        40
  rsi_overbought:      60
  hurst_max:           0.52
  halflife_min_hours:  1
  halflife_max_hours:  48
  universe_size:       40
  min_gain_pct:        0.002
  min_rr_ratio:        1.5

# --- VWAP Mean Reversion ---
vwap:
  ou_zscore_min:       1.0
  max_spread_pct:      0.001
  volume_ratio:        0.8
  max_intraday_move_pct: 0.03
  band_std:            2.0
  rsi_oversold:        40
  rsi_overbought:      70
  confirmation_bars:   1
  stop_extension:      0.5
  min_stop_pct:        0.01

# --- Kalman Pairs Trading ---
kalman_pairs:
  zscore_entry:        2.0
  zscore_exit:         0.2
  zscore_stop:         3.0
  max_hold_days:       10
  max_active:          15
  min_correlation:     0.80
  coint_pvalue:        0.05
  kalman_delta:        0.0001
  kalman_obs_noise:    0.001
  tp_pct:              0.015
  sl_pct:              0.010

# --- Opening Range Breakout ---
orb:
  enabled:             true
  volume_ratio:        1.3
  max_gap_pct:         0.04
  max_range_pct:       0.035
  min_stop_pct:        0.008
  scan_symbols:        15
  breakout_buffer:     0.001
  tp_mult:             1.5
  sl_mult:             0.5
  time_stop_hours:     2
  adx_filter_enabled:  true
  adx_min:             25
  adx_period:          14

# --- Micro Momentum ---
micro_momentum:
  spy_vol_spike_mult:  2.0
  spy_min_move_pct:    0.001
  max_hold_minutes:    15
  stop_pct:            0.01
  target_pct:          0.02
  max_trades_per_event: 2
  max_daily_gain_disable: 0.015
  top_beta_stocks:     5
  event_cooldown_sec:  900
  event_window_sec:    300

# --- Post-Earnings Announcement Drift ---
pead:
  enabled:             true
  min_surprise_pct:    5.0
  min_volume_ratio:    2.0
  hold_days_min:       10
  hold_days_max:       20
  take_profit:         0.05
  stop_loss:           0.03
  max_positions:       5
  position_size_pct:   0.02
